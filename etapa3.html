<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>3</title>
</head>
<body>
    <h1>Questionário HTML</h1>
    <div>
        <h3>Questão 3</h3>
        <p>O que faz um display: flex; ?</p>
        <button onclick="responder(false)">Esconde um elemento</button>
        <button onclick="responder(true)">Organiza layout</button>
    </div>

    <script>
        // Captura os pontos da URL anterior
    const params = new URLSearchParams(window.location.search);
    let pontosAtuais = parseInt(params.get('pts')) || 0;

    function responder(correto) {
        let novosPontos = correto ? pontosAtuais + 1 : pontosAtuais;
            // Redireciona para a próxima etapa (ex: etapa3.html)
        window.location.href = "etapa4.html?pts=" + novosPontos;
    }
    </script>

</body>
</html>
