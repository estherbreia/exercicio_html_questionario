<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>4</title>
</head>
<body>

    <div>
        <h1>Questão 4</h1>

        <p>Qual a função de class no html?</p>
        <button onclick="responder(true)">Identificar itens para CSS/JS</button>
        <button onclick="responder(false)">Classificar por ordem</button>
    </div>



<script>
    // Captura os pontos da URL anterior
const params = new URLSearchParams(window.location.search);
let pontosAtuais = parseInt(params.get('pts')) || 0;

function responder(correto) {
    let novosPontos = correto ? pontosAtuais + 1 : pontosAtuais;
        // Redireciona para a próxima etapa (ex: etapa3.html)
    window.location.href = "etapa5.html?pts=" + novosPontos;
}
</script>

</body>
</html>
